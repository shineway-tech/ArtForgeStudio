.windows-client: &windows-client
  - name: windows-client
    runner:
      namespace: group
      tags:
        - windows
    stages:
      - name: verify-toolchain
        script: |
          $ErrorActionPreference = "Stop"
          rustc --version
          cargo --version
          where.exe cl
      - name: cargo-check
        script: cargo check -p artforge-studio-native --locked
      - name: cargo-test
        script: cargo test -p artforge-studio-native --lib --locked
      - name: cargo-release
        script: cargo build -p artforge-studio-native --bin ArtForgeStudio --release --locked

master:
  push: *windows-client
  pull_request: *windows-client
